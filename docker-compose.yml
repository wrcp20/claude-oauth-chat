services:
  backend:
    build: ./backend
    container_name: chat-claude-backend
    ports:
      - "3200:3200"
    volumes:
      # Monta tus credenciales OAuth de Claude Code (solo lectura)
      - ${USERPROFILE}/.claude:/home/claude/.claude:ro
    environment:
      - PORT=3200
      - NODE_ENV=production
      - ALLOWED_ORIGINS=*
    restart: unless-stopped
