<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Claude</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3250;
      --text: #e2e4f0;
      --text-muted: #7c80a0;
      --accent: #7c6af5;
      --accent-hover: #9585f8;
      --user-bg: #1e2a45;
      --assistant-bg: #1a1d27;
      --code-bg: #0d0f18;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #7c6af5, #a855f7);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 16px; font-weight: 600; flex: 1; }

    #status-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    #status-badge.ok { color: #4ade80; border-color: #4ade8040; background: #4ade8010; }

    #model-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    #model-select:focus { border-color: var(--accent); }

    #btn-new {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 4px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: all .15s;
    }
    #btn-new:hover { border-color: var(--accent); color: var(--text); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .msg.user .avatar { background: var(--user-bg); }
    .msg.assistant .avatar { background: linear-gradient(135deg, #7c6af5, #a855f7); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 14px;
      max-width: calc(100% - 48px);
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown inside bubbles */
    .bubble p { margin: 0 0 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble strong { color: #c4b5fd; }
    .bubble em { color: #a5b4fc; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 12px 0 6px; font-weight: 600; }
    .bubble h1 { font-size: 1.2em; }
    .bubble h2 { font-size: 1.1em; }
    .bubble h3 { font-size: 1em; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin: 2px 0; }
    .bubble code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 12px;
      color: #a5f3fc;
    }
    .bubble pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0;
      overflow-x: auto;
    }
    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #e2e4f0;
    }
    .bubble blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 12px;
      color: var(--text-muted);
      margin: 6px 0;
    }
    .bubble a { color: var(--accent-hover); }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 6px; height: 6px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce .8s ease infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); opacity:.4; }
      40% { transform: translateY(-5px); opacity:1; }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }
    #empty-state .icon { font-size: 48px; opacity: .4; }
    #empty-state p { font-size: 15px; }
    #empty-state small { font-size: 12px; opacity: .6; }

    /* ── Input area ── */
    footer {
      padding: 12px 20px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 8px;
      max-width: 820px;
      margin: 0 auto;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 8px 8px 14px;
      transition: border-color .15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }

    #input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
      resize: none;
      max-height: 160px;
      line-height: 1.5;
      font-family: inherit;
    }
    #input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 36px; height: 36px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .15s, transform .1s;
      font-size: 16px;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-hover); }
    #send-btn:active:not(:disabled) { transform: scale(.95); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      max-width: 820px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">✦</div>
  <h1>Chat Claude</h1>
  <span id="status-badge">conectando...</span>
  <select id="model-select">
    <option value="claude-sonnet-4-6">Sonnet 4.6</option>
    <option value="claude-opus-4-6">Opus 4.6</option>
    <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
  </select>
  <button id="btn-new">+ Nueva</button>
</header>

<div id="messages">
  <div id="empty-state">
    <div class="icon">✦</div>
    <p>Empezá una conversación con Claude</p>
    <small>Usando tus credenciales OAuth de Claude Code · Sin consumir API key</small>
  </div>
</div>

<footer>
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Escribí tu mensaje..."></textarea>
    <button id="send-btn" title="Enviar (Enter)">↑</button>
  </div>
  <p class="hint">Enter para enviar · Shift+Enter para nueva línea</p>
</footer>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const modelSelect = document.getElementById('model-select');
  const statusBadge = document.getElementById('status-badge');
  const emptyState = document.getElementById('empty-state');
  const btnNew = document.getElementById('btn-new');

  let history = [];
  let isStreaming = false;

  // ── Status ─────────────────────────────────────────────────────────────────

  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      if (d.ok) {
        statusBadge.textContent = `${d.subscriptionType} · OAuth`;
        statusBadge.className = 'ok';
      } else {
        statusBadge.textContent = 'sin credenciales';
      }
    } catch {
      statusBadge.textContent = 'servidor offline';
    }
  }
  checkStatus();

  // ── Markdown renderer (simple, sin dependencias) ───────────────────────────

  function renderMarkdown(text) {
    return text
      // Escapar HTML excepto lo que generemos nosotros
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      // Bloques de código (``` ```)
      .replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
        `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`)
      // Código inline
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Headers
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      // Bold / Italic
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Horizontal rule
      .replace(/^---$/gm, '<hr>')
      // Blockquote
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      // Listas no ordenadas
      .replace(/^[\-\*] (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`)
      // Listas ordenadas
      .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
      // Links (solo http/https para prevenir javascript: y otros esquemas peligrosos)
      .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
      // Párrafos (líneas que no son elementos HTML)
      .split('\n\n')
      .map(block => {
        const trimmed = block.trim();
        if (!trimmed) return '';
        if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(trimmed)) return trimmed;
        return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
      })
      .join('\n');
  }

  // ── Message rendering ──────────────────────────────────────────────────────

  function addMessage(role, content, streaming = false) {
    if (emptyState) emptyState.remove();

    const div = document.createElement('div');
    div.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (streaming) {
      bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
    } else {
      bubble.innerHTML = role === 'user'
        ? content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')
        : renderMarkdown(content);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    return bubble;
  }

  // ── Send message ───────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isStreaming = true;
    sendBtn.disabled = true;

    history.push({ role: 'user', content: text });
    addMessage('user', text);

    const bubble = addMessage('assistant', '', true);
    let fullText = '';

    try {
      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: modelSelect.value,
          messages: history
        })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        bubble.innerHTML = `<span style="color:#f87171">Error: ${err.error || 'Request failed'}</span>`;
        history.pop();
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') break;

          try {
            const parsed = JSON.parse(data);
            if (parsed.text) {
              fullText += parsed.text;
              bubble.innerHTML = renderMarkdown(fullText);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (parsed.error) {
              bubble.innerHTML += `<span style="color:#f87171"> [${parsed.error}]</span>`;
            }
          } catch { /* ignorar */ }
        }
      }

      if (fullText) {
        history.push({ role: 'assistant', content: fullText });
      }

    } catch (e) {
      const safeMsg = e.message.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      bubble.innerHTML = `<span style="color:#f87171">Error de conexión: ${safeMsg}</span>`;
      history.pop();
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Controls ───────────────────────────────────────────────────────────────

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  btnNew.addEventListener('click', async () => {
    history = [];
    messagesEl.innerHTML = `
      <div id="empty-state">
        <div class="icon">✦</div>
        <p>Empezá una conversación con Claude</p>
        <small>Usando tus credenciales OAuth de Claude Code · Sin consumir API key</small>
      </div>`;
    // Reiniciar la sesión persistente en el server
    await fetch('/api/reset', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({}) });
    inputEl.focus();
  });

  // Cambio de modelo → reiniciar sesión con nuevo modelo
  modelSelect.addEventListener('change', async () => {
    history = [];
    await fetch('/api/reset', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ model: modelSelect.value })
    });
    statusBadge.textContent = 'reiniciando...';
    statusBadge.className = '';
    setTimeout(checkStatus, 3000);
  });
</script>
</body>
</html>
