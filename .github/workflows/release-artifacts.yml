name: Release Artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-flutter-web:
    name: Build Flutter Web + subir a Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        run: flutter pub get
        working-directory: frontend/flutter

      - name: Build web
        run: flutter build web --release --dart-define=API_URL=http://localhost:3200
        working-directory: frontend/flutter

      - name: Empaquetar build
        run: |
          cd frontend/flutter/build/web
          zip -r ../../../../claude-oauth-chat-web-${{ github.event.release.tag_name }}.zip .
          cd ../../../..

      - name: Subir ZIP a GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-oauth-chat-web-${{ github.event.release.tag_name }}.zip

  notify-discord:
    name: Notificar en Discord
    runs-on: ubuntu-latest
    needs: build-flutter-web
    if: ${{ secrets.DISCORD_WEBHOOK_URL != '' }}
    steps:
      - name: Enviar notificación
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "🚀 Nueva versión publicada: ${{ github.event.release.tag_name }}"
          description: |
            **${{ github.event.release.name }}**

            ${{ github.event.release.body }}

            [Ver Release](${{ github.event.release.html_url }})
          color: 0x7C6AF5
          username: "claude-oauth-chat"
