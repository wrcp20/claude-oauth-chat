name: Security Review

on:
  pull_request:
    branches: [main]

jobs:
  security-review:
    name: Revisión de seguridad con Claude
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Claude Security Review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            Eres un experto en seguridad. Revisá los cambios de este PR buscando:
            1. Secrets o credenciales hardcodeadas
            2. XSS o inyección en frontend
            3. Endpoints sin autenticación expuestos a redes no confiables
            4. Problemas con el manejo de tokens OAuth
            5. Configuraciones inseguras de Docker o CORS

            Solo reportá vulnerabilidades concretas y explotables (confianza > 80%).
            Ignorá: DOS, rate limiting, falta de tests, problemas teóricos.
            Respondé en español con severidad (CRÍTICO/ALTO/MEDIO) y recomendación concreta.
